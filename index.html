const brl=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v)||0);

const mlong=m=>{const n=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const[y,mo]=m.split('-');return `${n[+mo-1]}/${y.slice(2)}`};
const mnext=m=>{const[y,mo]=m.split('-').map(Number);return mo===12?`${y+1}-01`:`${y}-${String(mo+1).padStart(2,'0')}`};
const mprev=m=>{const[y,mo]=m.split('-').map(Number);return mo===1?`${y-1}-12`:`${y}-${String(mo-1).padStart(2,'0')}`};
const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
const formKey=s=>{const n=norm(s);if(n.includes('nubank'))return'nubank';if(n.includes('santander'))return'santander';if(n.includes('mercado'))return'mercadopago';if(n.includes('caedu'))return'caedu';if(n==='bb'||n.includes('bancodobrasil'))return'bb';return n};
async function fetchAba(a){if(!CFG.SHEETS_ID.includes('SUA_')&&!CFG.API_KEY.includes('SUA_')){const u=`https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEETS_ID}/values/${encodeURIComponent(a)}?key=${CFG.API_KEY}`;const r=await fetch(u);const d=await r.json();if(d.values&&d.values.length>1){const[h,...rows]=d.values;return rows.map(row=>Object.fromEntries(h.map((k,i)=>[k,row[i]||''])));}}return []}
async function fetchAll(){const[l,m,w,p]=await Promise.all([fetchAba('Lançamentos'),fetchAba('Metas'),fetchAba('Wishlist'),fetchAba('Parcelas')]);return{lancamentos:l,metas:m,wishlist:w,parcelas:p}}
function demoData(){return{lancamentos:[{Data:'06/05/2026',Tipo:'gasto',Categoria:'Alimentação',Descrição:'Supermercado Bom Preço',Valor:85.70,Forma_Pagto:'débito',Mês:'2026-05'},{Data:'06/05/2026',Tipo:'gasto',Categoria:'Transporte/Gasolina',Descrição:'Uber',Valor:27.40,Forma_Pagto:'nubank',Mês:'2026-05'},{Data:'05/05/2026',Tipo:'entrada',Categoria:'Salário',Descrição:'Salário',Valor:2450,Forma_Pagto:'pix',Mês:'2026-05'},{Data:'04/05/2026',Tipo:'gasto',Categoria:'Saúde/Farmácia',Descrição:'Academia Fit',Valor:89.90,Forma_Pagto:'santander',Mês:'2026-05'},{Data:'03/05/2026',Tipo:'gasto',Categoria:'Outros',Descrição:'Netflix',Valor:39.90,Forma_Pagto:'nubank',Mês:'2026-05'}],metas:[{Nome:'Reserva de emergência',Valor_Atual:2000,Valor_Meta:10000,Status:'Em andamento'},{Nome:'Dívida com o pai',Valor_Atual:1000,Valor_Meta:5400,Status:'Em andamento'},{Nome:'Dívida com a mãe',Valor_Atual:0,Valor_Meta:15000,Status:'Em andamento'}],wishlist:[{Item:'Airfryer',Valor_Est:350,Prioridade:'média',Status:'Pendente'}],parcelas:[{Descrição:'Notebook Dell Inspiron',Cartão:'nubank',Valor_Parcela:150,Parcela_Atual:6,Total_Parcelas:12,Valor_Total:1800,Encerra_Em:'05/12/2026'},{Descrição:'Sofá retrátil',Cartão:'santander',Valor_Parcela:200,Parcela_Atual:3,Total_Parcelas:10,Valor_Total:2000,Encerra_Em:'10/09/2026'}]}}
function useDados(logado){const[d,setD]=useState(null),[loading,setL]=useState(true);useEffect(()=>{if(!logado)return;fetchAll().then(x=>{if(!x.lancamentos.length&&!x.metas.length)setD(demoData());else setD(x)}).catch(()=>setD(demoData())).finally(()=>setL(false))},[logado]);return{dados:d,loading}}
function calcMes(dados,mes){const lst=(dados.lancamentos||[]).filter(r=>(r.Mês||r['Mês'])===mes);const gastos=lst.filter(r=>(r.Tipo||r['Tipo'])==='gasto').reduce((s,r)=>s+moneyNum(r.Valor||r['Valor']),0);const entradas=lst.filter(r=>(r.Tipo||r['Tipo'])==='entrada').reduce((s,r)=>s+moneyNum(r.Valor||r['Valor']),0);const saldo=entradas-gastos;const catTotals={};lst.filter(r=>(r.Tipo||r['Tipo'])==='gasto').forEach(r=>{const c=r.Categoria||r['Categoria']||'Outros';catTotals[c]=(catTotals[c]||0)+moneyNum(r.Valor||r['Valor'])});const topCats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,6);return{lst,gastos,entradas,saldo,catTotals,topCats}}

function Inicio({dados,mes,setTela}){const c=calcMes(dados,mes);const reserva=reservaAtual(dados);const fat=faturasTotal(dados,mes);const top=c.topCats.length?c.topCats:[['Alimentação',520],['Transporte',260],['Moradia',230],['Lazer',180],['Saúde',130],['Outros',120]];const total=c.gastos||1480;const totalLim=Object.values(CFG.LIMITES).reduce((a,b)=>a+b,0);const used=(c.gastos||1496)/totalLim*100;return <><div className="kpis"><KPI label="Receitas" value={brl(c.entradas||2450)} icon="💵" color="green" sub={[["Recebido",brl(c.entradas||2450)],["A receber",brl(0)]]}/><KPI label="Despesas" value={brl(c.gastos||1480)} icon="💳" color="red" sub={[["Pago",brl(c.gastos||1480)],["A pagar",brl(0)]]}/><KPI label="Saldo do mês" value={brl(c.saldo||970)} icon="⭐" color="blue" sub={[["Previsto",brl(1000)]]}/><KPI label="Reserva de emergência" value={brl(reserva)} icon="🛡" color="green" progress={reserva/CFG.META_RESERVA*100} sub={[["Meta",brl(CFG.META_RESERVA)],["Progresso",`${Math.round(reserva/CFG.META_RESERVA*100)}%`]]}/><KPI label="Faturas dos cartões" value={brl(fat||170)} icon="💳" color="purple" sub={[["Próximo vencimento","05/06"],["Cartões","5 cartões"]]}/><KPI label="Dívida do carro" value={brl(CFG.CARRO_FALTA)} icon="🚙" color="blue" sub={[["Pago",brl(CFG.CARRO_PAGO)],["Falta",brl(CFG.CARRO_FALTA)]]}/></div><div className="grid-main"><div className="card section-card"><div className="card-title">Gastos por categoria <button className="select-chip">Este mês⌄</button></div><Doughnut items={top} total={total}/><div className="legend">{top.map(([n,v],i)=><div className="legend-row" key={n}><span className="dot" style={{background:CFG.CORES[i]}}/><span>{n}</span><b>{brl(v)}</b><span className="muted">{Math.round(v/total*100)}%</span></div>)}</div></div><div className="card section-card"><div className="card-title">Evolução do saldo <button className="select-chip">Últimos 6 meses⌄</button></div><LineChart/></div><div className="card section-card"><div className="card-title">Orçamento do mês <button className="select-chip" onClick={()=>setTela('orcamento')}>Ver detalhes ›</button></div><div className="budget-list">{Object.entries(CFG.LIMITES).slice(0,5).map(([n,lim],i)=>{const val=c.catTotals[n]||[520,260,180,130,120][i]||0;const p=val/lim*100;return <div className="budget-row" key={n}><div className="sq">{['🍴','🚌','🎬','💊','◌'][i]}</div><div><div className="budget-name">{n.split('/')[0]}</div><div className="budget-bar"><span style={{width:`${Math.min(100,p)}%`}}/></div></div><div className="budget-money">{brl(val)} de {brl(lim)}<br/><b>{Math.round(p)}%</b></div></div>})}</div></div></div><div className="grid-bottom"><div className="card section-card"><div className="card-title">Últimas transações <button className="select-chip" onClick={()=>setTela('lancamentos')}>Ver todas</button></div><div className="transactions">{(c.lst.length?c.lst:demoData().lancamentos).slice(0,5).map((r,i)=><Tx r={r} key={i}/>)}</div></div><div className="card section-card"><div className="card-title">Orçamento do mês</div><div className="budget-summary"><div className="big-ring" style={{background:`conic-gradient(var(--green) 0 ${Math.min(100,used||73)}%,#eef2f7 ${Math.min(100,used||73)}%)`}}><div className="big-ring-inner"><div><strong>{Math.round(used||73)}%</strong><br/><span className="muted">Utilizado</span></div></div></div><div className="summary-lines"><div className="summary-line"><span>Orçamento total</span><b>{brl(totalLim)}</b></div><div className="summary-line"><span>Total utilizado</span><b>{brl(c.gastos||1496)}</b></div><div className="summary-line"><span>Disponível</span><b className="green">{brl(Math.max(totalLim-c.gastos,554))}</b></div></div></div><div className="tip">💡 Você ainda tem {brl(Math.max(totalLim-c.gastos,554))} disponível para usar até o fim do mês.</div></div></div></>}

return <div className="settings-page-v2">
 <div className="settings-layout-v2">

</div>}function Sidebar({tela,setTela,onLogout,saldoDisp,menuVersion}){const items=getMenuItems();return <aside className="sidebar"><div className={`brand ${showBrandText()?'':'only-logo'}`}><AppLogo/><span className="brand-text">{getAppName()}</span></div><nav className="nav">{items.map(i=><button className={`nav-item ${tela===i.id?'on':''}`} onClick={()=>setTela(i.id)} key={i.id}><span className="nav-icon"><IconView value={i.icone} label={i.nome}/></span>{i.nome}</button>)}</nav><div className="side-card"><div className="side-label">Saldo disponível</div><div className="side-value">{brl(saldoDisp)}</div></div><button className="logout" onClick={onLogout}>↪ Sair</button></aside>}
function MobileTop({tela,setTela,onLogout}){const[menu,setMenu]=useState(false);const[bell,setBell]=useState(false);const items=getMenuItems();let saved={};try{saved=JSON.parse(localStorage.getItem('bf-notificacoes')||'{}')}catch(e){}const defaultN=[{id:'resumo',icone:'🌤️',nome:'Resumo diário'},{id:'fatura',icone:'💳',nome:'Vencimento de fatura'},{id:'orcamento',icone:'📊',nome:'Orçamento estourado'},{id:'reserva',icone:'🛡️',nome:'Lembrete de reserva'},{id:'parcelas',icone:'📦',nome:'Parcelas encerrando'}];const ativos=defaultN.filter(n=>saved[n.id]!==false);const go=id=>{setTela(id);setMenu(false);setBell(false)};return <><div className="mobile-top"><div className="mobile-row"><button onClick={()=>{setMenu(true);setBell(false)}}>☰</button><div className={`mobile-brand ${showBrandText()?'':'only-logo'}`}><AppLogo/><span className="mobile-brand-text">{getAppName()}</span></div><button onClick={()=>{setBell(true);setMenu(false)}}>🔔</button></div></div>{(menu||bell)&&<div className="mobile-overlay" onClick={()=>{setMenu(false);setBell(false)}}></div>}{menu&&<div className="mobile-menu-panel"><div className="mobile-panel-head"><div className="mobile-panel-title">Menu</div><button className="mobile-close" onClick={()=>setMenu(false)}>×</button></div><div className="mobile-menu-list">{items.map(i=><button className={`mobile-menu-btn ${tela===i.id?'on':''}`} key={i.id} onClick={()=>go(i.id)}><span className="mobile-menu-icon"><IconView value={i.icone} label={i.nome}/></span>{i.nome}</button>)}<button className="mobile-menu-btn" onClick={onLogout}><span className="mobile-menu-icon">↪</span>Sair</button></div></div>}{bell&&<div className="mobile-bell-panel"><div className="mobile-panel-head"><div className="mobile-panel-title">Notificações</div><button className="mobile-close" onClick={()=>setBell(false)}>×</button></div><div className="notif-list-mini">{ativos.length?ativos.map(n=><div className="notif-mini-row" key={n.id}><div>{n.icone}</div><div><div className="notif-mini-ti function BottomNav({tela,setTela}){const[more,setMore]=useState(false);const[add,setAdd]=useState(false);const close=()=>{setMore(false);setAdd(false)};const go=id=>{setTela(id);close()};const moreItems=getMenuItems().filter(i=>!['inicio','lancamentos','orcamento'].includes(i.id));const quick=[['lancamentos','＋','Novo lançamento'],['wishlist','🛒','Nova compra/lista'],['metas','🎯','Nova meta'],['dividas','💸','Nova dívida'],['wishlist','☑️','Item de mercado']];return <>{(more||add)&&<div className="mobile-overlay" onClick={close}></div>}{more&&<div className="mobile-more-panel"><div className="mobile-panel-head"><div className="mobile-panel-title">Mais opções</div><button className="mobile-close" onClick={close}>×</button></div><div className="mobile-menu-list">{moreItems.map(i=><button className={`mobile-menu-btn ${tela===i.id?'on':''}`} key={i.id} onClick={()=>go(i.id)}><span className="mobile-menu-icon"><IconView value={i.icone} label={i.nome}/></span>{i.nome}</button>)}</div></div>}{add&&<div className="mobile-add-panel"><div className="mobile-panel-head"><div className="mobile-panel-title">Adicionar</div><button className="mobile-close" onClick={close}>×</button></div><div className="quick-grid">{quick.map(([id,ic,label],idx)=><button className="quick-btn" key={idx} onClick={()=>go(id)}><span>{ic}</span>{label}</button>)}</div></div>}<div className="bottom-nav"><button className={`bn-item ${tela==='inicio'?'on':''}`} onClick={()=>go('inicio')}><span className="bn-icon">🏠</span>Início</button><button className={`bn-item ${tela==='lancamentos'?'on':''}`} onClick={()=>go('lancamentos')}><span className="bn-icon">⊞</span>Lanç.</button><button className="bn-item" onClick={()=>{setAdd(!add);setMore(false)}}><span className="bn-plus">+</span></button><button className={`bn-item ${tela==='orcamento'?'on':''}`} onClick={()=>go('orcamento')}><span className="bn-icon">▦</span>Orçam.</button><button className={`bn-item ${more?'on':''}`} onClick={()=>{setMore(!more);setAdd(false)}}><span className="bn-icon">⋯</span>Mais</button></div></>}
function MainPage({dados,onLogout}){const[mes,setMes]=useState('2026-05'),[tela,setTela]=useState('inicio'),[menuVersion,setMenuVersion]=useState(0);useEffect(()=>{applyFavicon();document.title=getAppName()},[menuVersion]);const saldoDisp=calcMes(dados,mes).saldo;let page=<Inicio dados={dados} mes={mes} setTela={setTela}/>;if(tela==='lancamentos')page=<PageLancamentos dados={dados} mes={mes}/>;if(tela==='orcamento')page=<PageOrcamento dados={dados} mes={mes}/>;if(tela==='metas')page=<PageMetas dados={dados}/>;if(tela==='cartoes')page=<PageCartoes dados={dados} mes={mes}/>;if(tela==='contas')page=<PageContas/>;if(tela==='wishlist')page=<PageWishlist dados={dados}/>;if(tela==='relatorios')page=<PageRelatorios/>;if(tela==='dividas')page=<PageDividas/>;if(tela==='config')page=<PageConfig setTela={setTela} dados={dados} mes={mes} onMenuChange={setMenuVersion}/>;return <div className="app"><Sidebar tela={tela} setTela={setTela} onLogout={onLogout} saldoDisp={saldoDisp} menuVersion={menuVersion}/><MobileTop tela={tela} setTela={setTela} onLogout={onLogout}/><main className="main"><div className="page"><Header mes={mes} setMes={setMes} tela={tela} setTela={setTela} menuVersion={menuVersion} onLogout={onLogout}/>{page}</div></main><BottomNav tela={tela} setTela={setTela}/></div>}
